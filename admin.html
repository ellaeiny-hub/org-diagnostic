<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול ארגונים — אבחון ארגוני</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F5F2; --surface: #FFFFFF; --text: #1A1A18;
    --text-muted: #6B6B65; --text-light: #9E9E96;
    --accent: #2D5A3D; --accent-light: #E8F0EB;
    --blue: #1A4A6B; --blue-light: #E5EEF5;
    --amber: #8C6A1A; --amber-light: #F5EDD8;
    --coral: #8C3A2A; --coral-light: #F5E8E5;
    --border: #E2DDD8; --border-strong: #C8C2BB;
    --radius: 12px; --radius-sm: 8px;
  }
  body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text-light); margin-top: 1px; }
  .logo-mark { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-light); }
  .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  input[type="text"] { width: 100%; padding: 11px 14px; font-size: 15px; font-family: 'Heebo', sans-serif; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); }
  input[type="text"]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,90,61,0.1); background: white; }
  textarea { width: 100%; padding: 10px 14px; font-size: 14px; font-family: 'Heebo', sans-serif; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); resize: none; line-height: 1.5; }
  textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,90,61,0.1); background: white; }
  .btn-primary { display: block; width: 100%; padding: 12px; font-size: 15px; font-weight: 500; font-family: 'Heebo', sans-serif; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); cursor: pointer; margin-top: 1rem; }
  .btn-primary:hover { background: #234a32; }
  .btn-primary:disabled { background: var(--border-strong); cursor: not-allowed; }
  .btn-sm { padding: 6px 12px; font-size: 12px; font-family: 'Heebo', sans-serif; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid var(--border-strong); background: transparent; color: var(--text-muted); white-space: nowrap; }
  .btn-sm:hover { background: var(--bg); }
  .btn-sm.blue { background: var(--blue-light); color: var(--blue); border-color: var(--blue-light); }
  .btn-sm.green { background: var(--accent-light); color: var(--accent); border-color: var(--accent-light); }
  .btn-sm.red { background: var(--coral-light); color: var(--coral); border-color: var(--coral-light); }
  .btn-sm.amber { background: var(--amber-light); color: var(--amber); border-color: var(--amber-light); }
  .org-row { padding: 1rem 0; border-bottom: 1px solid var(--border); }
  .org-row:last-child { border-bottom: none; padding-bottom: 0; }
  .org-top { display: flex; align-items: center; justify-content: space-between; }
  .org-name { font-size: 15px; font-weight: 500; }
  .org-code { font-size: 11px; color: var(--text-light); margin-top: 2px; font-family: monospace; }
  .org-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 99px; margin-left: 6px; }
  .badge-active { background: var(--accent-light); color: var(--accent); }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 1rem auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-msg { font-size: 14px; color: var(--text-light); text-align: center; padding: 1.5rem; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-light); margin: 1.5rem 0 0.75rem; }
  .links-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-top: 10px; display: none; }
  .link-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .link-row:last-child { margin-bottom: 0; }
  .link-label { font-size: 11px; font-weight: 600; color: var(--text-muted); width: 80px; flex-shrink: 0; }
  .link-url { font-size: 12px; color: var(--blue); font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .link-copy { font-size: 11px; padding: 3px 8px; cursor: pointer; border: 1px solid var(--border-strong); border-radius: 4px; background: white; color: var(--text-muted); white-space: nowrap; }

  /* Question editor */
  .q-editor { display: none; margin-top: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem; }
  .q-editor-title { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 0.75rem; display: flex; align-items: center; justify-content: space-between; }
  .q-item { background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; display: flex; gap: 8px; align-items: flex-start; }
  .q-num { font-size: 11px; font-weight: 600; color: var(--text-light); width: 20px; flex-shrink: 0; padding-top: 3px; }
  .q-textarea { flex: 1; border: none; background: transparent; font-size: 14px; font-family: 'Heebo', sans-serif; color: var(--text); resize: none; padding: 0; line-height: 1.5; }
  .q-textarea:focus { outline: none; }
  .q-delete { background: none; border: none; cursor: pointer; color: var(--text-light); font-size: 16px; padding: 0 2px; flex-shrink: 0; line-height: 1; }
  .q-delete:hover { color: var(--coral); }
  .q-add-btn { display: flex; align-items: center; gap: 6px; width: 100%; padding: 8px 12px; font-size: 13px; font-family: 'Heebo', sans-serif; background: transparent; border: 1px dashed var(--border-strong); border-radius: var(--radius-sm); color: var(--text-muted); cursor: pointer; margin-bottom: 10px; }
  .q-add-btn:hover { background: white; }
  .q-save-btn { display: block; width: 100%; padding: 9px; font-size: 13px; font-weight: 500; font-family: 'Heebo', sans-serif; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); cursor: pointer; }
  .q-save-btn:hover { background: #234a32; }
  .save-msg { font-size: 12px; color: var(--accent); text-align: center; margin-top: 6px; display: none; }
  .q-audience { font-size: 11px; font-family: 'Heebo', sans-serif; border: 1px solid var(--border-strong); border-radius: 4px; padding: 3px 6px; background: var(--bg); color: var(--text-muted); cursor: pointer; flex-shrink: 0; margin-top: 2px; }
  .q-audience:focus { outline: none; border-color: var(--accent); }
  .aud-both { background: var(--bg); }
  .aud-mid { background: var(--blue-light); color: var(--blue); border-color: var(--blue-light); }
  .aud-senior { background: var(--accent-light); color: var(--accent); border-color: var(--accent-light); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .org-row { animation: fadeIn 0.2s ease; }
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title">מסך ניהול — אבחון ארגוני</div>
    <div class="header-sub">ניהול פרויקטים וארגונים</div>
  </div>
  <span class="logo-mark">אבחון ארגוני</span>
</div>

<div class="main">
  <div class="card">
    <div class="card-title">יצירת פרויקט חדש</div>
    <div style="margin-bottom:1rem;">
      <label for="inp-org-name">שם הארגון</label>
      <input type="text" id="inp-org-name" placeholder="לדוגמה: חברת אלפא" />
    </div>
    <button class="btn-primary" onclick="createOrg()">צור פרויקט ←</button>
  </div>

  <div class="section-label">פרויקטים פעילים</div>
  <div class="card" id="orgs-card">
    <div class="spinner" id="orgs-loading"></div>
    <div id="orgs-list"></div>
  </div>
</div>

<script>
const BASE = window.location.origin;

const DEFAULT_QUESTIONS = [
  { id: 'success', text: 'תאר/י הצלחה שחווה הצוות / העובדים שלך', badge: 'חוזקות' },
  { id: 'challenges', text: 'תאר/י אתגרים ניהוליים מרכזיים שאתה/את מתמודד/ת איתם כיום', badge: 'אתגרים' },
  { id: 'culture', text: 'מה המאפיינים הבולטים ביותר של התרבות הארגונית?', badge: 'תרבות ארגונית' },
  { id: 'senior_helps', text: 'כיצד הדרג שמעליך מסייע לך בעבודתך? תאר/י את המשאבים והצרכים שהדרג שמעליך נותן להם מענה', badge: 'דרג בכיר' },
  { id: 'senior_blocks', text: 'כיצד הדרג שמעליך מעכב אותך בעבודתך? תאר/י את המשאבים והצרכים שהדרג שמעליך לא מצליח לתת להם מענה', badge: 'דרג בכיר' },
  { id: 'change', text: 'מה השינוי האחד שהיה משפר משמעותית את יעילות הניהול בארגון?', badge: 'חזון' }
];

async function redisCmd(command) {
  const res = await fetch('/api/admin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ command })
  });
  return res.json();
}

async function loadOrgs() {
  document.getElementById('orgs-loading').style.display = 'block';
  document.getElementById('orgs-list').innerHTML = '';
  try {
    const data = await redisCmd(['LRANGE', 'orgs', '0', '-1']);
    const ids = data.result || [];
    document.getElementById('orgs-loading').style.display = 'none';
    if (ids.length === 0) {
      document.getElementById('orgs-list').innerHTML = '<div class="empty-msg">טרם נוצרו פרויקטים. צרי פרויקט חדש למעלה.</div>';
      return;
    }
    const orgs = (await Promise.all(ids.map(async id => {
      const r = await redisCmd(['GET', 'org:' + id]);
      return r.result ? JSON.parse(r.result) : null;
    }))).filter(Boolean).reverse();
    renderOrgs(orgs);
  } catch(e) {
    document.getElementById('orgs-loading').style.display = 'none';
    document.getElementById('orgs-list').innerHTML = '<div class="empty-msg" style="color:#8C3A2A">שגיאה בטעינת הנתונים</div>';
  }
}

function renderOrgs(orgs) {
  const el = document.getElementById('orgs-list');
  el.innerHTML = '';
  orgs.forEach(org => {
    const surveyUrl = BASE + '/?org=' + org.code;
    const hrUrl = BASE + '/hr?org=' + org.code;
    const div = document.createElement('div');
    div.className = 'org-row';
    div.id = 'org-' + org.code;
    div.innerHTML = `
      <div class="org-top">
        <div>
          <div class="org-name"><span class="badge badge-active">פעיל</span>${org.name}</div>
          <div class="org-code">קוד: ${org.code} · נוצר: ${new Date(org.created).toLocaleDateString('he-IL')}</div>
        </div>
        <div class="org-actions">
          <button class="btn-sm" onclick="toggleLinks('${org.code}')">קישורים</button>
          <button class="btn-sm amber" onclick="toggleQEditor('${org.code}')">✎ שאלות</button>
          <button class="btn-sm blue" onclick="window.open('${hrUrl}','_blank')">דשבורד HR ↗</button>
          <button class="btn-sm red" onclick="deleteOrg('${org.code}','${org.name}')">מחק</button>
        </div>
      </div>

      <div class="links-box" id="links-${org.code}">
        <div class="link-row">
          <span class="link-label">למנהלים</span>
          <span class="link-url">${surveyUrl}</span>
          <button class="link-copy" onclick="copyText('${surveyUrl}',this)">העתק</button>
        </div>
        <div class="link-row">
          <span class="link-label">לדשבורד HR</span>
          <span class="link-url">${hrUrl}</span>
          <button class="link-copy" onclick="copyText('${hrUrl}',this)">העתק</button>
        </div>
      </div>

      <div class="q-editor" id="qed-${org.code}">
        <div class="q-editor-title">
          <span>שאלות הארגון</span>
          <span style="font-size:11px;font-weight:400;color:var(--text-light)">גררי לשינוי סדר</span>
        </div>
        <div class="q-list" id="qlist-${org.code}"></div>
        <button class="q-add-btn" onclick="addQuestion('${org.code}')">+ הוסיפי שאלה</button>
        <button class="q-save-btn" onclick="saveQuestions('${org.code}')">שמור שאלות</button>
        <div class="save-msg" id="savemsg-${org.code}">✓ השאלות נשמרו!</div>
      </div>`;
    el.appendChild(div);
  });
}

async function toggleLinks(code) {
  const box = document.getElementById('links-' + code);
  box.style.display = box.style.display === 'block' ? 'none' : 'block';
}

async function toggleQEditor(code) {
  const ed = document.getElementById('qed-' + code);
  const isOpen = ed.style.display === 'block';
  ed.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) await loadQuestions(code);
}

async function loadQuestions(code) {
  const r = await redisCmd(['GET', 'questions:' + code]);
  const questions = r.result ? JSON.parse(r.result) : DEFAULT_QUESTIONS;
  renderQList(code, questions);
}

function renderQList(code, questions) {
  const el = document.getElementById('qlist-' + code);
  el.innerHTML = '';
  questions.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'q-item';
    div.dataset.id = q.id;
    const aud = q.audience || 'both';
    div.innerHTML = `
      <span class="q-num">${i + 1}</span>
      <textarea class="q-textarea" rows="2" oninput="autoResize(this)">${q.text}</textarea>
      <select class="q-audience aud-${aud}" onchange="updateAudClass(this)" title="למי מיועדת השאלה?">
        <option value="both" ${aud==='both'?'selected':''}>כולם</option>
        <option value="mid" ${aud==='mid'?'selected':''}>דרג מנהלים</option>
        <option value="senior" ${aud==='senior'?'selected':''}>דרג בכיר</option>
      </select>
      <button class="q-delete" onclick="removeQuestion(this)" title="מחק שאלה">×</button>`;
    el.appendChild(div);
    autoResize(div.querySelector('textarea'));
  });
}

function updateAudClass(sel) {
  sel.className = 'q-audience aud-' + sel.value;
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function addQuestion(code) {
  const el = document.getElementById('qlist-' + code);
  const count = el.children.length + 1;
  const div = document.createElement('div');
  div.className = 'q-item';
  div.dataset.id = 'q_' + Date.now();
  div.innerHTML = `
    <span class="q-num">${count}</span>
    <textarea class="q-textarea" rows="2" placeholder="כתבי כאן את השאלה..." oninput="autoResize(this)"></textarea>
    <select class="q-audience aud-both" onchange="updateAudClass(this)" title="למי מיועדת השאלה?">
      <option value="both">כולם</option>
      <option value="mid">דרג מנהלים</option>
      <option value="senior">דרג בכיר</option>
    </select>
    <button class="q-delete" onclick="removeQuestion(this)" title="מחק שאלה">×</button>`;
  el.appendChild(div);
  div.querySelector('textarea').focus();
}

function removeQuestion(btn) {
  const item = btn.closest('.q-item');
  const list = item.parentElement;
  item.remove();
  // renumber
  Array.from(list.children).forEach((el, i) => {
    el.querySelector('.q-num').textContent = i + 1;
  });
}

async function saveQuestions(code) {
  const items = document.querySelectorAll('#qlist-' + code + ' .q-item');
  const questions = Array.from(items).map((item, i) => ({
    id: item.dataset.id || 'q_' + i,
    text: item.querySelector('textarea').value.trim(),
    audience: item.querySelector('select.q-audience')?.value || 'both',
    badge: 'שאלה ' + (i + 1)
  })).filter(q => q.text);

  if (questions.length === 0) { alert('נא להוסיף לפחות שאלה אחת'); return; }

  const btn = document.querySelector('#qed-' + code + ' .q-save-btn');
  btn.textContent = 'שומר...';
  btn.disabled = true;

  await redisCmd(['SET', 'questions:' + code, JSON.stringify(questions)]);

  btn.textContent = 'שמור שאלות';
  btn.disabled = false;
  const msg = document.getElementById('savemsg-' + code);
  msg.style.display = 'block';
  setTimeout(() => msg.style.display = 'none', 2500);
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ הועתק';
    setTimeout(() => btn.textContent = 'העתק', 2000);
  });
}

async function createOrg() {
  const name = document.getElementById('inp-org-name').value.trim();
  if (!name) { alert('נא להזין שם ארגון'); return; }
  const btn = document.querySelector('.btn-primary');
  btn.disabled = true; btn.textContent = 'יוצר...';
  try {
    const code = name.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_\u0590-\u05FF]/g, '').slice(0, 20) + '_' + Date.now().toString(36).slice(-4).toUpperCase();
    const org = { code, name, created: new Date().toISOString() };
    await redisCmd(['SET', 'org:' + code, JSON.stringify(org)]);
    await redisCmd(['RPUSH', 'orgs', code]);
    // Save default questions for this org
    await redisCmd(['SET', 'questions:' + code, JSON.stringify(DEFAULT_QUESTIONS)]);
    document.getElementById('inp-org-name').value = '';
    await loadOrgs();
  } catch(e) { alert('שגיאה ביצירת הפרויקט'); }
  btn.disabled = false; btn.textContent = 'צור פרויקט ←';
}

async function deleteOrg(code, name) {
  if (!confirm('למחוק את הפרויקט "' + name + '"?\nכל התשובות והשאלות יימחקו לצמיתות.')) return;
  try {
    await redisCmd(['DEL', 'org:' + code]);
    await redisCmd(['DEL', 'questions:' + code]);
    await redisCmd(['DEL', 'resp_ids:' + code]);
    await loadOrgs();
  } catch(e) { alert('שגיאה במחיקה'); }
}

loadOrgs();
</script>
</body>
</html>
